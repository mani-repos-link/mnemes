server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/wasm;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://pyapi:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /healthz {
        proxy_pass http://pyapi:8080/healthz;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
